<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DigiHub{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>DigiHub</h1>
    <nav>
      <a href="{{ url_for('config') }}" class="{{ 'active' if request.endpoint == 'config' else '' }}">Configuration</a>
      <a href="{{ url_for('mode') }}" class="{{ 'active' if request.endpoint == 'mode' else '' }}">Mode</a>
      <a href="{{ url_for('rig') }}" class="{{ 'active' if request.endpoint == 'rig' else '' }}">Rig Control</a>
      <a href="{{ url_for('pat') }}" class="{{ 'active' if request.endpoint == 'pat' else '' }}">Winlink</a>
      <a href="{{ url_for('ardop') }}" class="{{ 'active' if request.endpoint == 'ardop' else '' }}">ARDOP</a>
      <a href="{{ url_for('webchat') }}" class="{{ 'active' if request.endpoint == 'webchat' else '' }}">WebChat</a>
      <a href="{{ url_for('fldigi') }}" class="{{ 'active' if request.endpoint == 'fldigi' else '' }}">FLDigi</a>
      <a href="{{ url_for('guiapps') }}" class="{{ 'active' if request.endpoint == 'guiapps' else '' }}">GUI Apps</a>
      <a href="{{ url_for('console') }}" class="{{ 'active' if request.endpoint == 'console' else '' }}">Console</a>
      <a href="{{ url_for('update') }}" class="{{ 'active' if request.endpoint == 'update' else '' }}">Update</a>
      <a href="{{ url_for('docs') }}" class="{{ 'active' if request.endpoint == 'docs' else '' }}">Manual</a>
      <a href="{{ url_for('power') }}" class="{{ 'active' if request.endpoint == 'power' else '' }}">Power</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
